<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vermelhou Geral - Garantido</title>
    <style>
        :root {
            --vermelho: #ed1c24;
            --branco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--vermelho); /* Fundo todo vermelho */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Fundo de Corações Brancos para contrastar com o vermelho */
        .heart {
            position: absolute;
            color: var(--branco);
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* Layout Principal */
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            width: 95%;
            z-index: 10;
        }

        /* Imagens Laterais */
        .side-photo {
            max-width: 300px; /* Limite para não ocupar a tela toda */
            height: auto;
            border: none; /* Sem bordas */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: float 4s ease-in-out infinite; /* Efeito flutuante */
        }

        /* Foto da esquerda flutua em tempo diferente da direita */
        .photo-1 { animation-delay: 0s; }
        .photo-2 { animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Centro: Spotify e Letra */
        .center-content {
            text-align: center;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Container da Letra */
        .lyrics-box {
            color: var(--branco);
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            height: 150px;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.6;
            scrollbar-width: thin;
        }

        /* Esconder scrollbar em navegadores chrome/safari */
        .lyrics-box::-webkit-scrollbar {
            width: 5px;
        }
        .lyrics-box::-webkit-scrollbar-thumb {
            background: var(--branco);
            border-radius: 10px;
        }

        iframe {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Os corações são gerados pelo JavaScript -->

    <div class="container">
        <!-- Primeira Foto -->
        <img src="img/1.jpeg" alt="Foto 1" class="side-photo photo-1">

        <!-- Centro: Player Spotify e Letra -->
        <div class="center-content">
            
            <!-- Player do Spotify -->
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/5vGfa9QqvmGGn3bGa47t7x?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

            <!-- Letra da Música -->
            <div class="lyrics-box">
                O maior amor do mundo és tu...<br>
                A paixão da minha vida és tu...<br>
                Meu amor, VERMELHOU!<br>
                O calor que me aquece és tu...<br>
                Essa luz que me ilumina és tu...<br>
                Meu amor, VERMELHOU!<br>
                Quem me faz seguir em frente és tu...<br>
                Quem me dá força e coragem és tu...<br>
                A minha felicidade és tu...<br>
                Meu amor, VERMELHOU!
            </div>
        </div>

        <!-- Segunda Foto -->
        <img src="img/2.jpeg" alt="Foto 2" class="side-photo photo-2">
    </div>

    <script>
        // Gerador de corações contínuo
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            
            document.body.appendChild(heart);

            // Remove o coração após a animação para não pesar o site
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Inicia a chuva de corações automaticamente
        setInterval(createHeart, 300);
    </script>
</body>
</html>
